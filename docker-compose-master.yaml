version: '3.8'

services:
  master:
    build: .
    container_name: btree-master
    environment:
      REPLICA_MODE: MASTER
      REPLICATION_MODE: MASTER
      TREE_DEGREE: 3
      NODE_ID: node1
    ports:
      - "8080:8080"
      - "8090:8090"
    networks:
      - btree-net

  replica1:
    build: .
    container_name: btree-replica1
    environment:
      REPLICA_MODE: REPLICA
      REPLICATION_MODE: MASTER
      TREE_DEGREE: 3
      NODE_ID: node2
    ports:
      - "8081:8080"
      - "8091:8090"
    networks:
      - btree-net
    depends_on:
      - master

  replica2:
    build: .
    container_name: btree-replica2
    environment:
      REPLICA_MODE: REPLICA
      REPLICATION_MODE: MASTER
      TREE_DEGREE: 3
      NODE_ID: node3
    ports:
      - "8082:8080"
      - "8092:8090"
    networks:
      - btree-net
    depends_on:
      - master

networks:
  btree-net:
    driver: bridge