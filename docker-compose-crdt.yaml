version: '3.8'

services:
  replica-crdt1:
    build: .
    container_name: btree-replica-crdt1
    environment:
      REPLICATION_MODE: CRDT
      TREE_DEGREE: 3
      NODE_ID: node1
    ports:
      - "8080:8080"
      - "8090:8090"
    networks:
      - btree-net

  replica-crdt2:
    build: .
    container_name: btree-replica-crdt2
    environment:
      REPLICATION_MODE: CRDT
      TREE_DEGREE: 3
      NODE_ID: node2
    ports:
      - "8081:8080"
      - "8091:8090"
    networks:
      - btree-net

  replica-crdt3:
    build: .
    container_name: btree-replica-crdt3
    environment:
      REPLICATION_MODE: CRDT
      TREE_DEGREE: 3
      NODE_ID: node3
    ports:
      - "8082:8080"
      - "8092:8090"
    networks:
      - btree-net

networks:
  btree-net:
    driver: bridge